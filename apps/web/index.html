<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MyFamily</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      button { font-family: inherit; transition: transform .12s ease, opacity .12s ease, background-color .2s ease, border-color .2s ease; }
      button:active { transform: scale(.98); }
      textarea, input { font-family: inherit; }
      :focus-visible { outline: 2px solid #2E7D8A; outline-offset: 2px; border-radius: 6px; }
      @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
      @keyframes sheetUp { from { transform: translateY(18px); opacity: .5 } to { transform: translateY(0); opacity: 1 } }
      .overlay { animation: fadeIn .18s ease both; }
      .sheet { animation: sheetUp .24s cubic-bezier(.2, 0, 0, 1) both; }
      .toast { animation: fadeIn .18s ease both; }
      @media (prefers-reduced-motion: reduce) {
        *, .overlay, .sheet, .toast { animation: none !important; transition: none !important; }
        button:active { transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
