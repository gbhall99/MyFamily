name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    name: Verify (lint + typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: token-lint (AC-D7 / AC-DG3)
        run: pnpm run lint:tokens
      - name: typecheck
        run: pnpm run typecheck
      - name: tests (token contrast + member accents + ui logic)
        run: pnpm run test
